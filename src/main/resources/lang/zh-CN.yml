    lore:
      - "Glass capable of transmitting low amounts of data."

  NTW_OPTIC_CABLE:
    name: "Optic Cable"
    lore:
      - "Cable capable of transmitting high amounts of data."

  NTW_OPTIC_STAR:
    name: "Optic Star"
    lore:
      - "A star capable of transmitting vast amounts of data."

  NTW_RADIOACTIVE_OPTIC_STAR:
    name: "Radioactive Optic Star"
    lore:
      - "A star capable of transmitting near-infinite data."

  NTW_SHRINKING_BASE:
    name: "Shrinking Base"
    lore:
      - "A device that can shrink large objects."

  NTW_SIMPLE_NANOBOTS:
    name: "Simple Nano-bots"
    lore:
      - "Micro-robots that assist with precision tasks."

  NTW_ADVANCED_NANOBOTS:
    name: "Advanced Nano-bots"
    lore:
      - "Micro-robots that assist with precision tasks."
      - "Smarter and more efficient than simple ones."

  NTW_AI_CORE:
    name: "AI Core"
    lore:
      - "A first-generation AI in a fragile shell."

  NTW_EMPOWERED_AI_CORE:
    name: "Empowered AI Core"
    lore:
      - "Advanced AI encased in a reinforced shell."

  NTW_PRISTINE_AI_CORE:
    name: "Pristine AI Core"
    lore:
      - "Perfect-grade AI unearthed from ancient ruins."

  NTW_INTERDIMENSIONAL_PRESENCE:
    name: "Interdimensional Presence"
    lore:
      - "A perfect AI that has mastered the"
      - "ability to cross dimensions."

  NTW_CONTROLLER:
    name: "Network Controller"
    lore:
      - "The core component of the network."
      - "Only 1 controller allowed per network."
      - "max 8k ya lekku sayang."

# --- Core Network Items ---
  NTW_BRIDGE:
    name: "Network Bridge"
    lore:
      - "Bridges are used to connect different network"
      - "items to form a complete network."

  NTW_MONITOR:
    name: "Network Monitor"
    lore:
      - "The monitor can interact with nearby blocks"
      - "allowing specified blocks to access the network."
      - ""
      - "Currently supports:"
      - "InfinityLib - Storage Units"
      - "FluffyMachines - Fluffy Barrels"
      - "Networks - Quantum Storage"
      - "<random_color>Network Expansion - Network Drawers"

  NTW_IMPORT:
    name: "Network Input"
    lore:
      - "The input node sends items into the network."
      - "Transfers up to 9 stacks per SF tick."
      - "Can receive items from Cargo networks."

  NTW_EXPORT:
    name: "Network Output"
    lore:
      - "The output node can be configured to"
      - "continuously export 1 stack of a specific item."
      - "Cargo networks can extract items from this node."

  NTW_GRABBER:
    name: "Network Grabber"
    lore:
      - "Attempts to grab the first item from"
      - "the specified machine."

  NTW_PUSHER:
    name: "Network Pusher"
    lore:
      - "Attempts to push specified items"
      - "into the machine."

  NTW_MOREPUSHER:
    name: "Network Pusher V2"
    lore:
      - "Attempts to push specified items"
      - "into the machine."
      - "Provides 9 slots for pushing."

  NTW_BESTPUSHER:
    name: "Network Pusher V3"
    lore:
      - "Attempts to push specified items"
      - "into the machine."
      - "Provides 12 slots for pushing."

# --- Interaction & Automation ---
  NTW_CONTROL_X:
    name: "Network Cutter"
    lore:
      - "Attempts to \"cut\" blocks from the world"
      - "directly into the network."
      - "Only supports vanilla non-container blocks."
      - ""
      - "<click_info>Power Cost: <passive>100J per operation"

  NTW_CONTROL_V:
    name: "Network Paster"
    lore:
      - "Attempts to \"paste\" blocks from the"
      - "network into the world."
      - "Only supports vanilla blocks."
      - ""
      - "<click_info>Power Cost: <passive>100J per operation"

  NTW_VACUUM:
    name: "Network Vacuum"
    lore:
      - "Absorbs dropped items in a 4x4 area"
      - "and attempts to send them into the network."
      - ""
      - "<click_info>Power Cost: <passive>100J/Slimefun Tick"

  NTW_VANILLA_GRABBER:
    name: "Vanilla Container Grabber"
    lore:
      - "Attempts to grab the first item from"
      - "a specified vanilla container."
      - ""
      - "This machine cannot interact with the network directly."
      - "You still need a Network Grabber to pull"
      - "items from this machine into the network."

  NTW_VANILLA_PUSHER:
    name: "Vanilla Container Pusher"
    lore:
      - "Attempts to push items into a"
      - "specified vanilla container."
      - ""
      - "This machine cannot interact with the network directly."
      - "You still need a Network Pusher to push"
      - "items from the network into this machine."

# --- Wireless Systems ---
  NTW_NETWORK_WIRELESS_TRANSMITTER:
    name: "Wireless Network Transmitter"
    lore:
      - "Transfers items to a bound Wireless"
      - "Network Receiver (Same dimension only)."
      - "Use a Wireless Configurator to bind them."
      - "Consumes 500J per transfer."

  NTW_EXPANSION_ADVANCED_WIRELESS_TRANSMITTER:
    name: "Advanced Wireless Transmitter"
    lore:
      - "Transfers items to a bound Wireless"
      - "Network Receiver (Same dimension only)."
      - "Use a Wireless Configurator to bind them."

  NTW_NETWORK_WIRELESS_RECEIVER:
    name: "Wireless Network Receiver"
    lore:
      - "Receives items from a bound Wireless"
      - "Network Transmitter (Same dimension only)."
      - "Attempts to push received items into"
      - "the network every Slimefun tick."

# --- Management & Utilities ---
  NTW_TRASH:
    name: "Network Deleter"
    lore:
      - "Continuously removes specified items"
      - "from the network. Items are destroyed"
      - "instantly. Use with caution!"

  NTW_GRID:
    name: "Network Grid"
    lore:
      - "Allows you to view all items in the network."
      - "Insert or extract items directly."
      - "Supports Pinyin search."

  NTW_CRAFTING_GRID:
    name: "Crafting Grid"
    lore:
      - "Similar to the standard Grid but"
      - "displays fewer items to allow for"
      - "direct crafting using network resources."
      - "Supports Pinyin search."

  NTW_CELL:
    name: "Network Cell"
    lore:
      - "Provides 54 slots (Double Chest capacity)."
      - "Accessible via the network or manually."

  NTW_GREEDY_BLOCK:
    name: "Network Blocker"
    lore:
      - "Sets a specific item to be collected from"
      - "network inputs, up to 1 stack."
      - "Once full, it blocks that item from"
      - "transferring elsewhere in the network."

# --- Quantum Storage ---
  NTW_QUANTUM_WORKBENCH:
    name: "Network Quantum Workbench"
    lore:
      - "Used to craft Quantum Storage units."

  NTW_QUANTUM_STORAGE_8:
    name: "Network Quantum Storage (∞)"
    lore:
      - "Stores near-infinite amounts of items."
      - ""
      - "Stores vast quantities within a quantum singularity."

# --- Power Systems ---
  NTW_CAPACITOR_4:
    name: "Network Capacitor (4)"
    lore:
      - "Receives and stores power from energy"
      - "networks for use by network devices."
      - ""
      - "<click_info>Capacity: <passive>1,000,000"

  NTW_POWER_OUTLET_1:
    name: "Network Power Outlet (1)"
    lore:
      - "Transfers power from the network to"
      - "specified machines."
      - ""
      - "<click_info>Internal Storage: <passive>500J"

  NTW_POWER_DISPLAY:
    name: "Network Power Meter"
    lore:
      - "Displays network power status."
      - "Simple, right?"

# --- Auto-Crafting ---
  NTW_RECIPE_ENCODER:
    name: "Network Recipe Encoder"
    lore:
      - "Creates crafting blueprints from input items."
      - ""
      - "<click_info>Power Cost: <passive>2,000 per encoding"

  NTW_AUTO_CRAFTER:
    name: "Network Auto-Crafter"
    lore:
      - "Requires a Crafting Blueprint to operate."
      - "Automatically crafts items using network"
      - "resources when the target item is missing."
      - ""
      - "<click_info>Power Cost: <passive>64 per craft"

  NTW_AUTO_CRAFTER_WITHHOLDING:
    name: "Network Auto-Crafter (Stockpile)"
    lore:
      - "Requires a Crafting Blueprint to operate."
      - "Crafts until the output slot has 1 stack."
      - "Output can be accessed by the network"
      - "or extracted via Cargo systems."
      - ""
      - "<click_info>Power Cost: <passive>128 per craft"

  NTW_CRAFTING_BLUEPRINT:
    name: "Crafting Blueprint"
    lore:
      - "A blank blueprint used to store"
      - "a crafting recipe."

# --- Tools & Configuration ---
  NTW_PROBE:
    name: "Network Probe"
    lore:
      - "Right-click the Network Controller"
      - "to view the number of nodes."

  NTW_REMOTE_ULTIMATE:
    name: "Ultimate Network Remote"
    lore:
      - "Remotely opens bound Grids."
      - "Target chunk must be loaded."
      - ""
      - "<click_info>Shift+Right-click <passive>a Grid to bind."
      - ""
      - "<click_info>Range: <passive>Interdimensional"

  NTW_CONFIGURATOR:
    name: "Network Configurator"
    lore:
      - "Used to copy/paste settings between nodes."
      - "Supports directional settings."
      - ""
      - "<click_info>Right-click: <passive>Apply settings"
      - "<click_info>Shift+Right-click: <passive>Store settings"

  NTW_WIRELESS_CONFIGURATOR:
    name: "Wireless Configurator"
    lore:
      - "Used to store a receiver's location"
      - "and apply it to a transmitter."
      - ""
      - "<click_info>Right-click: <passive>Store receiver location"
      - "<click_info>Shift+Right-click: <passive>Apply to transmitter"

# --- Expansion Items ---
  NTW_EXPANSION_CRAFTING_GRID_NEW_STYLE:
    name: "Advanced Crafting Grid"
    lore:
      - "Allows viewing and direct manipulation"
      - "of all network items."
      - "Supports custom keybinds."
      - "Sorting: "
      - "&eAZ&7: &eAlphabetical"
      - "&eAmount&7: &eQuantity (Ascending)"
      - "&eReverse Amount&7: &eQuantity (Descending)"
      - "&eAddon&7: &eBy Addon Alphabetical"
      - "Supports Pinyin search."

  NTW_EXPANSION_DRAWER_TIPS:
    name: "Drawer Usage Tips"
    lore:
      - "1. Always remember your Drawer ID (visible in GUI)."
      - "   This is needed for admin compensation if it breaks."
      - "2. If a drawer becomes bugged, ask an admin to place"
      - "   a new one, look at it, and use /networks setContainerId <id>."
      - "Example: /networks setContainerId 1037"

  NTW_EXPANSION_SUPER_TRASH:
    name: "Super Trash Can"
    lore:
      - "Instantly destroys all input items."
      - "Clicking items in your inventory while"
      - "the GUI is open will destroy them."

