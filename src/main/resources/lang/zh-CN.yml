  NTW_CAPACITOR_1:
    name: "Network Capacitor (4)"
    lore:
      - "Receives and stores power from energy"
      - "networks for use by network devices."
      - ""
      - "<click_info>Capacity: <passive>1,000"

  NTW_CAPACITOR_2:
    name: "Network Capacitor (4)"
    lore:
      - "Receives and stores power from energy"
      - "networks for use by network devices."
      - ""
      - "<click_info>Capacity: <passive>10,000"

  NTW_CAPACITOR_3:
    name: "Network Capacitor (4)"
    lore:
      - "Receives and stores power from energy"
      - "networks for use by network devices."
      - ""
      - "<click_info>Capacity: <passive>100,000"

  NTW_CAPACITOR_4:
    name: "Network Capacitor (4)"
    lore:
      - "Receives and stores power from energy"
      - "networks for use by network devices."
      - ""
      - "<click_info>Capacity: <passive>1,000,000"

  NTW_POWER_OUTLET_1:
    name: "Network Power Outlet (1)"
    lore:
      - "Transfers power from the network to"
      - "specified machines."
      - ""
      - "<click_info>Internal Storage: <passive>500J"

  NTW_POWER_DISPLAY:
    name: "Network Power Meter"
    lore:
      - "Displays network power status."
      - "Simple, right?"

# --- Auto-Crafting ---
  NTW_RECIPE_ENCODER:
    name: "Network Recipe Encoder"
    lore:
      - "Creates crafting blueprints from input items."
      - ""
      - "<click_info>Power Cost: <passive>2,000 per encoding"

  NTW_AUTO_CRAFTER:
    name: "Network Auto-Crafter"
    lore:
      - "Requires a Crafting Blueprint to operate."
      - "Automatically crafts items using network"
      - "resources when the target item is missing."
      - ""
      - "<click_info>Power Cost: <passive>64 per craft"

  NTW_AUTO_CRAFTER_WITHHOLDING:
    name: "Network Auto-Crafter (withholding)"
    lore:
      - "Requires a Crafting Blueprint to operate."
      - "Crafts until the output slot has 1 stack."
      - "Output can be accessed by the network"
      - "or extracted via Cargo systems."
      - ""
      - "<click_info>Power Cost: <passive>128 per craft"

  NTW_CRAFTING_BLUEPRINT:
    name: "Crafting Blueprint"
    lore:
      - "A blank blueprint used to store"
      - "a crafting recipe."

# --- Tools & Configuration ---
  NTW_PROBE:
    name: "Network Probe"
    lore:
      - "Right-click the Network Controller"
      - "to view the number of nodes."

  NTW_REMOTE_ULTIMATE:
    name: "Ultimate Network Remote"
    lore:
      - "Remotely opens bound Grids."
      - "Target chunk must be loaded."
      - ""
      - "<click_info>Shift+Right-click <passive>a Grid to bind."
      - ""
      - "<click_info>Range: <passive>Interdimensional"

  NTW_CONFIGURATOR:
    name: "Network Configurator"
    lore:
      - "Used to copy/paste settings between nodes."
      - "Supports directional settings."
      - ""
      - "<click_info>Right-click: <passive>Apply settings"
      - "<click_info>Shift+Right-click: <passive>Store settings"

  NTW_WIRELESS_CONFIGURATOR:
    name: "Wireless Configurator"
    lore:
      - "Used to store a receiver's location"
      - "and apply it to a transmitter."
      - ""
      - "<click_info>Right-click: <passive>Store receiver location"
      - "<click_info>Shift+Right-click: <passive>Apply to transmitter"

# --- Expansion Items ---
  NTW_EXPANSION_CRAFTING_GRID_NEW_STYLE:
    name: "Advanced Crafting Grid"
    lore:
      - "Allows viewing and direct manipulation"
      - "of all network items."
      - "Supports custom keybinds."
      - "Sorting: "
      - "&eAZ&7: &eAlphabetical"
      - "&eAmount&7: &eQuantity (Ascending)"
      - "&eReverse Amount&7: &eQuantity (Descending)"
      - "&eAddon&7: &eBy Addon Alphabetical"
      - "Supports Pinyin search."

  NTW_EXPANSION_DRAWER_TIPS:
    name: "Drawer Usage Tips"
    lore:
      - "1. Always remember your Drawer ID (visible in GUI)."
      - "   This is needed for admin compensation if it breaks."
      - "2. If a drawer becomes bugged, ask an admin to place"
      - "   a new one, look at it, and use /networks setContainerId <id>."
      - "Example: /networks setContainerId 1037"

  NTW_EXPANSION_SUPER_TRASH:
    name: "Super Trash Can"
    lore:
      - "Instantly destroys all input items."
      - "Clicking items in your inventory while"
      - "the GUI is open will destroy them."

