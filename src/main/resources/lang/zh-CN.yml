items:
  # DO NOT CHANGE OR DELETE THESE ANNOUNCEMENTS
  NTW_EXPANSION_ANNOUNCE_1:
    name: "<color_random_string>定义"
    lore:
      - "<warning> 1) Declaration refers to all declarations stated herein."
      - "<warning> 2) Networks refers to a Slimefun addon, not a network in the sense of the Internet, Internet of Things (IoT), or other traditional meanings of a network."
      - "<warning> 3) NetworksExpansion (hereinafter referred to as \"NetworksExpansion\", \"this addon\", or \"this project\") refers to a Slimefun addon developed by the NetworksExpansion Development Team based on Networks. It fully complies with the GPLv3 license, includes appropriate additions and modifications, is based on Paper 1.20.1 and the localized version of Slimefun, and is not fully compatible with Paper 1.20.5 and above."
      - "<warning> 4) NetworksExpansion Developers (hereinafter referred to as the \"NetworksExpansion Development Team\" or \"NetworksExpansion Creators\") refers to the group developing NetworksExpansion and is not owned by any company or organization."
  NTW_EXPANSION_ANNOUNCE_2:
    name: "<color_random_string>网络拓展作品声明"
    lore:
      - "<warning> Before reading this declaration, please be sure to read the definitions first."
      - "<warning> 1) NetworksExpansion is completely free, shared, and open-source on GitHub for the study and use of supporters, maintainers, and creators."
      - "<warning> 2) The GPLv3 license is the open-source license for NetworksExpansion; anyone is free to use, modify, and distribute it, but any modification or distribution must comply with the GPLv3 license."
      - "<warning> 3) Herein, \"NetworksExpansion\" is merely the title of the file and does not contain any ambiguity or profit-related involvement."
      - "<warning> 4) The NetworksExpansion developers act only as the creators of this addon, do not provide any commercial support, and are no longer actively maintaining it. Furthermore, the NetworksExpansion developers never participate in any direct or indirect operational activities related to any server."
      - "<warning> 5) It is strictly forbidden to use the aforementioned plugin and this addon to promote any form of negative or violent information; it is strictly forbidden to use the aforementioned files for illegal or infringing activities; any involvement in political or vulgar content is strictly prohibited."
      - "<warning> 6) Reselling is strictly prohibited, including but not limited to disguised trading activities and unauthorized tampering with the aforementioned files for any profit-making behavior."
      - "<warning> 7) We strongly condemn the aforementioned prohibited items and encourage the public to supervise each other and actively report illegal and non-compliant behaviors."
      - "<warning> 8) Any consequences resulting from improper use by you as an individual or group must be borne by yourself. It is strictly forbidden to shift responsibility in any form to the maintainers and creators of the aforementioned plugin and configuration files."
      - "<warning> 9) Infringers shall, depending on the circumstances, bear civil liabilities such as ceasing the infringement, eliminating the impact, offering an apology, and compensating for losses. If public interests are harmed, the copyright administrative department may order the cessation of the infringement, confiscate illegal gains, confiscate and destroy infringing reproductions, and impose fines. If the circumstances are serious enough to constitute a crime, criminal responsibility shall be pursued according to law."
      - "<warning> 10) When the NetworksExpansion developers do not pursue the infringing behavior of an infringer, it does not represent an endorsement of the infringement, nor does it mean the infringer is exempt from any responsibility."
      - "<warning> Please be sure to abide by the above declaration."
  NTW_EXPANSION_ANNOUNCE_3:
    name: "<color_random_string>网络拓展使用声明"
    lore:
      - "<warning> Before reading this declaration, please be sure to read the NetworksExpansion Work Declaration first."
      - "<warning> GuizhanLibPlugin is a dependency for this addon; please ensure it is correctly installed."
      - "<warning> The development/localized version of Slimefun is a dependency for this addon; likewise, please ensure it is correctly installed."
      - "<warning> When using NetworksExpansion or its content, you must comply with laws and regulations. You must not use NetworksExpansion or its content to engage in illegal or non-compliant activities, including but not limited to the following:"
      - "<warning> 1. Violating the basic principles established by the Constitution;"
      - "<warning> 1) Endangering national security, leaking state secrets, subverting state policies, or undermining national unity;"
      - "<warning> 2) Damaging national honor and interests;"
      - "<warning> 3) Distorting, vilifying, desecrating, or denying the deeds and spirit of heroes and martyrs; or infringing upon their names, images, reputations, or honors through insult, defamation, or other means;"
      - "<warning> 4) Promoting terrorism or extremism, or inciting the implementation of terrorist or extremist activities;"
      - "<warning> 5) Inciting ethnic hatred or discrimination and undermining ethnic unity;"
      - "<warning> 6) Undermining national religious policies or promoting cults and feudal superstitions;"
      - "<warning> 7) Spreading rumors and disrupting social order;"
      - "<warning> 8) Spreading obscenity, pornography, gambling, violence, murder, terror, or abetting crime;"
      - "<warning> 9) Insulting or defaming others, or infringing upon the reputation, privacy, and other legitimate rights and interests of others;"
      - "<warning> 10) Violating public morality;"
      - "<warning> 11) Other content prohibited by laws, administrative regulations, and state provisions."
      - "<warning> 2. You must not use NetworksExpansion or its content to produce, reproduce, or publish harmful information containing the following:"
      - "<warning> 1) Using exaggerated titles where the content is seriously inconsistent with the title;"
      - "<warning> 2) Hype regarding rumors, scandals, misdeeds, etc.;"
      - "<warning> 3) Making improper comments on natural disasters, major accidents, or other calamities;"
      - "<warning> 4) Containing sexual suggestions, teasing, or other content that easily induces sexual associations;"
      - "<warning> 5) Displaying bloodiness, horror, cruelty, or other content that causes physical or mental discomfort;"
      - "<warning> 6) Inciting mass discrimination, regional discrimination, etc.;"
      - "<warning> 7) Promoting lowbrow, vulgar, or kitsch content;"
      - "<warning> 8) Content that may trigger minors to imitate unsafe behavior, violate public morality, or induce bad habits in minors;"
      - "<warning> 9) Other content that has a negative impact on the internet ecosystem."
  NTW_EXPANSION_ANNOUNCE_4:
    name: "<color_random_string>网络拓展作者声明"
    lore:
      - "<warning> Before reading this declaration, please be sure to read the NetworksExpansion Usage Declaration first."
      - "<warning> 1) The members of the NetworksExpansion Development Team are citizens of the People's Republic of China, who heartily recognize the theory of Socialism with Chinese characteristics and uphold the leadership of the Communist Party of China."
      - "<warning> 2) Members of the NetworksExpansion Development Team oppose decadent and backward ideologies such as capitalism, imperialism, hegemonism, and feudalism."
      - "<warning> 3) Members of the NetworksExpansion Development Team consciously abide by the Constitution and laws and oppose cyber-violence."
      - "<warning> 4) Members of the NetworksExpansion Development Team consciously abide by community norms, ensuring civilized communication without using abusive language."
      - "<warning> 5) Any acts of abuse or attacks against the NetworksExpansion Development Team or its members will be handled according to law; any cyber-violence such as 'doxing' (human flesh search) will be reported to the police."
      - "<warning> 6) This declaration represents only the stance of the NetworksExpansion Development Team and does not represent others, any game, organization, company, nation, social group, or any gaming community."
      - "<warning> 7) This declaration is subjectively impartial and focuses solely on the matters themselves, targeting the issue rather than the individual."
      - "<passive> This addon was written by Sefiraat, localized by ybw0014, and has been expanded, modified, and maintained by yitoudaidai and tinalness."
      - "<passive> Thanks to the machines from LogiTech for providing the author head hashes."
      - "<passive> Thanks to all server owners who have shown trust and installed NetworksExpansion."
      - "<passive> This addon was inspired by the vast community of players."
      - "<passive> Special thanks to Utoboy, TouRuya, haiman233, matl114, and other players for their suggestions."
      - "<passive> Thanks to Utoboy, TouRuya, haiman233, yitoudaidai, tinalness, matl114, lengshang, and other testers for their testing."
  NTW_EXPANSION_ANNOUNCE_5:
    name: "<color_random_string>网络拓展相关链接"
    lore:
      - "<warning> Before reading this declaration, please be sure to read the NetworksExpansion Author Declaration first."
      - "<passive> The following are links related to NetworksExpansion: (Please verify the official links)"
      - "<passive> NetworksExpansion Build Site: <click_info>https://builds.guizhanss.com/ytdd9527/NetworksExpansion/master/builds"
      - "<passive> NetworksExpansion Stable Version GitHub Repository: <click_info>https://github.com/ytdd9527/NetworksExpansion"
      - "<passive> NetworksExpansion Stable Version GitHub Issues: <click_info>https://github.com/ytdd9527/NetworksExpansion/issues"
      - "<passive> NetworksExpansion Stable Version GitHub PR: <click_info>https://github.com/ytdd9527/NetworksExpansion/pulls"
      - "<passive> NetworksExpansion Development Version GitHub Repository: <click_info>https://github.com/balugaq/NetworksExpansion"
      - "<warning> NetworksExpansion Development Version does not accept GitHub Issues"
      - "<warning> NetworksExpansion Development Version does not accept GitHub PRs"
      - "<passive> NetworksExpansion Author GitHub Page: <click_info>https://github.com/ytdd9527"
      - "<passive> NetworksExpansion Author GitHub Page: <click_info>https://github.com/balugaq"
  NTW_EXPANSION_ANNOUNCE_6:
    name: "<color_random_string>网络拓展的目的"
    lore:
      - "<warning> Before reading this declaration, please be sure to read the NetworksExpansion Related Links first."
      - "<passive> The purpose of NetworksExpansion is to provide more convenience and accessibility on the basis of Networks, enhancing its transportation functions."
      - "<passive> At the same time, it aims to minimize latency issues caused by Networks as much as possible and reduce bugs and errors caused by Networks."
  NTW_EXPANSION_ANNOUNCE_7:
    name: "<color_random_string>网络拓展相关答疑"
    lore:
      - "<warning> Before reading this declaration, please be sure to read the Purpose of NetworksExpansion first."
      - "<warning> 1) Why is NetworksExpansion updated so frequently, and why do strange issues sometimes occur?"
      - "<passive> - This is normal; the NetworksExpansion Development Team cannot guarantee that every version will run perfectly. If possible, please use the stable versions from the build site."
      - "<warning> 2) Why are some great features not added to NetworksExpansion?"
      - "<passive> - Due to the nature of NetworksExpansion, certain features may not be suitable for use in Networks, as Networks is a transportation system."
      - "<warning> 3) Why are some already implemented features that benefited players removed in later versions?"
      - "<passive> - The removal of existing features is a decision made by the NetworksExpansion Development Team after long-term consideration; they are not removed randomly."
      - "<passive> - Generally, some features are removed because they cause excessive latency or create more bugs."
      - "<passive> - Additionally, features may be removed due to verbal attacks or malicious behavior directed at members of the NetworksExpansion Development Team."
  NTW_EXPANSION_ANNOUNCE_8:
    name: "<color_random_string>网络拓展补充说明"
    lore:
      - "<warning> Before reading this declaration, please be sure to read the NetworksExpansion FAQ first."
      - "<warning> 1) The NetworksExpansion developers have no obligation to maintain this addon. For errors, bugs, or issues that suddenly appear in the stable version, please submit an Issue to the stable version's GitHub repository in a timely manner."
      - "<passive> 2) We cannot guarantee that all issues will be fixed promptly, but we will do our best to resolve them."
      - "<passive> 3) When communicating with developers, you should remain polite and avoid malicious attacks or insults. This is the effective way to communicate and solve your problems."
      - "<warning> 4) When you use, play, or modify NetworksExpansion, it is assumed by default that you agree to abide by these declarations."
      - "<passive> 5) The NetworksExpansion developers reserve the right to modify or terminate this declaration at any time."
      - "<warning> 6) When this declaration is updated, you should consciously check for any objections. Generally, after a version update, the NetworksExpansion Development Team assumes you agree to abide by the updated declarations."
      - "<passive> 7) You should avoid involving \"NetworksExpansion,\" the \"NetworksExpansion Development Team,\" or its members in political and public events. <warning>Otherwise, the NetworksExpansion Development Team has the right to suspend or terminate maintenance of the addon."
      - "<passive> 8) If this declaration is released by the NetworksExpansion developers in other languages, the Chinese version shall prevail."
      - "<passive> 9) The effectiveness, fulfillment, interpretation, and dispute resolution of this declaration shall be governed by the laws of Mainland China (excluding conflict of laws)."
      - "<passive> 10) All headings in this declaration are for reading convenience only and have no actual meaning themselves; they cannot be used as a basis for interpreting the meaning of this declaration."
      - "<warning> 11) If any part of this declaration is invalid for any reason, the remaining terms shall remain valid and binding on all parties."
      - "<warning> 12) If the full content of the declaration cannot be viewed due to reasons such as a small screen, please adjust it yourself; the NetworksExpansion Development Team assumes no responsibility for this."
      - "<warning> 13) If the full item names or item descriptions cannot be viewed due to reasons such as a small screen, server owners or players must resolve this themselves; the NetworksExpansion Development Team assumes no responsibility for this."
      - "<warning> 14) NetworksExpansion allows anyone to use, copy, modify, merge, publish, distribute, exhibit, and circulate this declaration for non-profit purposes, but no one may use this declaration for commercial purposes. Furthermore, any promotion in the name of NetworksExpansion or the NetworksExpansion Development Team is prohibited."
      - "<warning> 15) The right of final interpretation for all declarations of this addon belongs to the NetworksExpansion developers."
  NTW_EXPANSION_ANNOUNCE_9:
    name: "<color_random_string>网络拓展版本信息"
    lore:
      - "<warning> Before reading this declaration, please be sure to read the NetworksExpansion Supplemental Instructions first."
      - "<passive> This page can serve as the version information you need to provide when reporting issues related to NetworksExpansion."
      - "<passive> But a reminder once again:"
      - "<warning> NetworksExpansion Development Version does not accept GitHub Issues"
      - "<warning> NetworksExpansion Development Version does not accept GitHub PRs"
      - "<passive> Version Information:"
      - "<passive> NetworksExpansion Version: v2.1.93"
      - "<passive> Version Status: Stable Version"
      - "<passive> Version Update Time: 2026-3-14 21:28:04"
      - "<passive> Development Status: Updating"
      - "<passive> Developer(s): ytdd9527, balugaq"
      - "<passive> Developer GitHub Page: <click_info>https://github.com/ytdd9527"
      - "<passive> Developer GitHub Page: <click_info>https://github.com/balugaq"
      - "<passive> NetworksExpansion Stable Version Download: https://builds.guizhanss.com/ytdd9527/NetworksExpansion/master/builds"
      - "<passive> NetworksExpansion Development Version Download: https://github.com/balugaq/NetworksExpansion"
      - "<passive> Thanks to everyone who contributed to NetworksExpansion through Issues, PRs, and commits!"
      - "<passive> Thanks to everyone who provided suggestions for the development of NetworksExpansion!"
      - "<passive> Thanks to Utoboy, TouRuya, haiman233, yitoudaidai, tinalness, matl114, and other players for providing suggestions!"
      - "<passive> Thanks again! :>"
  NTW_EXPANSION_ANNOUNCE_10:
    name: "<color_random_string>网络拓展游玩体验声明"
    lore:
      - "<warning> Before reading this declaration, please be sure to read the NetworksExpansion Version Information first."
      - "<passive> Regarding the issue of the Network Crafter losing blueprints, according to an announcement by the Slimefun developers:"
      - "<passive> ——When item PDC data is too large, items cannot be saved to the Slimefun database. Server owners need to manually adjust the database table data types"
      - "<passive> ——and enable the `bypass-item-length-check` option in the settings to skip the item size check."
      - "<passive> The PDC of Network Crafter blueprints is usually quite massive; this is to maintain compatibility with blueprints from years ago and ensure the player experience."
      - "<passive> Additionally, according to testing by matl114, upgrading machines in place may also lead to item loss:"
      - "<passive> Here is an example that <warning>might<passive> be reproducible: Place machine A, put quantity C of item D in slot B, break it and replace it with machine E, put quantity C of item D in slot B,"
      - "<passive> After the server restarts, item D in machine E disappears."
      - "<passive> The reasons above have little to do with NetworksExpansion itself. We suggest players remain rational and avoid blind verbal attacks against NetworksExpansion."
      - "<passive> Recently, <warning>rumors<passive> such as \"using the NetworksExpansion crafter won't lose blueprints\" have been circulating."
      - "<passive> We hope everyone stays vigilant and is not misled by such rumors."
      - "<passive> The declaration ends here."

